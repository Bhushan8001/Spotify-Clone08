<div class="top-bar">
  <div class="top-bar__left">
    <div class="top-bar__logo" data-tooltip="Spotify">
      <img
        class="top-bar__logo-img"
        src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_White.png"
        alt="Spotify"
      />
    </div>
  </div>
  <div class="top-bar__center">
    <button class="top-bar__home" aria-label="Home" data-tooltip="Home" (click)="home.emit()">
      <svg class="top-bar__home-icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
      </svg>
    </button>
    <div class="top-bar__search">
      <svg class="top-bar__search-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M10 2a8 8 0 1 1 0 16a8 8 0 0 1 0-16zm0 2a6 6 0 1 0 0 12a6 6 0 0 0 0-12zm9.2 14.8l-3.4-3.4a1 1 0 0 0-1.4 1.4l3.4 3.4a1 1 0 0 0 1.4-1.4z" />
      </svg>
      <input
        [ngModel]="searchQuery"
        (ngModelChange)="search.emit($event)"
        type="text"
        placeholder="What do you want to play?"
        [class.active]="activeView === 'search'"
        class="top-bar__input"
      />
      <div class="top-bar__shortcut" aria-hidden="true">
        <span class="top-bar__key">Ctrl</span>
        <span class="top-bar__key">Shift</span>
        <span class="top-bar__key">L</span>
      </div>
      <span class="top-bar__search-divider" aria-hidden="true"></span>
      <button class="top-bar__search-action" type="button" aria-label="Browse" data-tooltip="Browse">
        <svg class="top-bar__search-action-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v12h12V6H6zm2 2h8v2H8V8zm0 4h8v2H8v-2z" />
        </svg>
      </button>
    </div>
  </div>
  <div class="top-bar__actions">
    <button class="top-bar__cta" data-tooltip="Upgrade to Premium">Explore Premium</button>
    <button class="top-bar__install" type="button">
      <span class="top-bar__install-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3a9 9 0 1 0 9 9a9 9 0 0 0-9-9zm0 2a7 7 0 1 1 0 14a7 7 0 0 1 0-14zm-1 3h2v5.2l2 2l-1.4 1.4L11 14.2V8z" />
        </svg>
      </span>
      <span>Install App</span>
    </button>
    <button class="top-bar__icon-button" aria-label="What's new" data-tooltip="What's new">
      <svg class="top-bar__icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 22a2.5 2.5 0 0 0 2.45-2H9.55A2.5 2.5 0 0 0 12 22zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2z" />
      </svg>
    </button>
    <button class="top-bar__icon-button" aria-label="Friend Activity" data-tooltip="Friend Activity">
      <svg class="top-bar__icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M16 11a4 4 0 1 0-4-4a4 4 0 0 0 4 4zm-8 1a4 4 0 1 0-4-4a4 4 0 0 0 4 4zm8 2c-2.7 0-8 1.35-8 4v2h16v-2c0-2.65-5.3-4-8-4zm-8 .5c-2.2 0-6 1.1-6 3.5V20h6v-2.5a4.7 4.7 0 0 1 2.1-3.9A10.7 10.7 0 0 0 8 14.5z" />
      </svg>
    </button>
    <button class="top-bar__avatar" aria-label="Bhushan" data-tooltip="Bhushan">B</button>
  </div>
</div>
